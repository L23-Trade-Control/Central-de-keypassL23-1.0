    <meta name="mobile-web-app-capable" content="yes">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:"Segoe UI",sans-serif; background:#0a0a2e; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { background:#0d1b6e; border:1px solid #1e40af; border-radius:16px; padding:28px; width:100%; max-width:420px; }
        .logo-topo { display:block; margin:0 auto 12px; width:100px; height:100px; object-fit:contain; border-radius:18px; }
        h1 { color:#fff; font-size:18px; text-align:center; margin-bottom:4px; }
        .sub { color:#60a5fa; font-size:12px; text-align:center; margin-bottom:24px; }
        label { color:#a0b4ff; font-size:12px; font-weight:600; display:block; margin-bottom:5px; }
        input, select { width:100%; padding:12px; border:1px solid #2a4adf; border-radius:8px; background:rgba(255,255,255,0.07); color:#fff; font-size:14px; outline:none; margin-bottom:14px; }
        input { font-family:monospace; }
        .btn { width:100%; padding:14px; background:linear-gradient(135deg,#1e40af,#3b82f6); color:white; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
        .resultado { margin-top:20px; background:rgba(0,0,0,0.3); border:1px solid #22c55e; border-radius:10px; padding:16px; display:none; }
        .chave-display { color:#4ade80; font-size:18px; font-weight:700; font-family:monospace; letter-spacing:2px; text-align:center; word-break:break-all; margin-bottom:8px; }
        .info-lic { color:#a0b4ff; font-size:11px; margin-bottom:12px; text-align:center; }
        .btn-copiar { width:100%; padding:10px; background:linear-gradient(135deg,#15803d,#22c55e); color:white; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }
        .aviso { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:12px; margin-top:16px; color:#fca5a5; font-size:11px; text-align:center; }
        .badge { background:#1e40af; color:#93c5fd; font-size:10px; padding:2px 8px; border-radius:10px; display:inline-block; margin-bottom:16px; }
    </style>
</head>

    <h1>L23 - Gerador de Chaves</h1>
    <p class="sub">Painel Administrativo</p>
    <div style="text-align:center;"><span class="badge">Sistema V2 - Validacao por Device ID</span></div>

    <label>CODIGO DO DISPOSITIVO</label>
    <input type="text" id="deviceId" placeholder="Ex: A3F7-9K2M" oninput="this.value=this.value.toUpperCase()">

    <label>NOME DO USUARIO</label>
    <input type="text" id="nomeUser" placeholder="Ex: Joao Silva">

    <label>PRAZO DE ACESSO</label>
    <select id="dias">
        <option value="999">Indeterminado</option>
        <option value="30">30 dias</option>
        <option value="60">60 dias</option>
        <option value="90">90 dias</option>
        <option value="180">180 dias</option>
        <option value="365">365 dias (1 ano)</option>
    </select>

    <button class="btn" onclick="gerarChave()">GERAR CHAVE</button>

    <div class="resultado" id="resultado">
        <div class="chave-display" id="chaveGerada"></div>
        <div class="info-lic" id="infoLic"></div>
        <button class="btn-copiar" onclick="copiarChave()">Copiar Chave</button>
    </div>

    <div class="aviso">Use exclusivo do administrador. Nao compartilhe esta pagina.</div>
</div>
<script>
var SECRET = "L23chevetteamarelo2024";

function sha256(str) {
    function rr(v,a){return(v>>>a)|(v<<(32-a));}
    var mp=Math.pow,mw=mp(2,32),i,j,res="";
    var w=[],abl=str.length*8;
    var h=sha256.h=sha256.h||[];
    var k=sha256.k=sha256.k||[];
    var pc=k.length,ic={};
    for(var c=2;pc<64;c++){if(!ic[c]){for(i=0;i<313;i+=c)ic[i]=c;h[pc]=(mp(c,.5)*mw)|0;k[pc++]=(mp(c,1/3)*mw)|0;}}
    str+="\x80";
    while(str.length%64-56)str+="\x00";
    for(i=0;i<str.length;i++){j=str.charCodeAt(i);if(j>>8)return"";w[i>>2]|=j<<((3-i)%4)*8;}
    w[w.length]=((abl/mw)|0);w[w.length]=(abl|0);
    for(j=0;j<w.length;){
        var ww=w.slice(j,j+=16),oh=h.slice(0);
        h=sha256.h.slice(0);
        for(i=0;i<64;i++){
            var w15=ww[i-15],w2=ww[i-2],a=h[0],e=h[4];
            var t1=h[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&h[5])^(~e&h[6]))+k[i]+(ww[i]=(i<16)?ww[i]:(ww[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+ww[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
            var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&h[1])^(a&h[2])^(h[1]&h[2]));
            h=[(t1+t2)|0].concat(h);h[4]=(h[4]+t1)|0;h.length=8;
        }
        h=h.map(function(v,i){return(v+oh[i])|0;});
    }
    for(i=0;i<8;i++){for(j=3;j+1;j--){var b=(h[i]>>(j*8))&255;res+=((b<16)?0:"")+b.toString(16);}}
    return res.toUpperCase();
}

function gerarChave() {
    var deviceId = document.getElementById("deviceId").value.trim().toUpperCase();
    var nome = document.getElementById("nomeUser").value.trim();
    var dias = parseInt(document.getElementById("dias").value);
    if (!deviceId || !nome) { alert("Preencha o codigo e o nome!"); return; }
    var nomeClean = nome.toUpperCase().replace(/\s/g,"").substring(0,12);
    var rawMain = deviceId + "|" + dias + "|" + SECRET;
    var hMain = sha256(rawMain);
    var p1 = hMain.substring(0,4)+"-"+hMain.substring(4,8)+"-"+hMain.substring(8,12)+"-"+hMain.substring(12,16);
    var diasHex = ("0"+dias.toString(16)).slice(-2).toUpperCase();
    var rawCheck = deviceId + "|" + dias + "|" + nomeClean + "|" + SECRET + "|V2";
    var hCheck = sha256(rawCheck);
    var p2 = diasHex + hCheck.substring(0,4);
    var chave = p1 + "-" + p2;
    document.getElementById("chaveGerada").textContent = chave;
    var expiryStr = dias === 999 ? "Indeterminado" : new Date(Date.now()+dias*24*60*60*1000).toLocaleDateString("pt-BR");
    var diasStr = dias === 999 ? "Indeterminado" : dias+" dias";
    document.getElementById("infoLic").textContent = "Para: "+nome+" | "+diasStr+" | Validade: "+expiryStr;
    document.getElementById("resultado").style.display = "block";
}

function copiarChave() {
    var chave = document.getElementById("chaveGerada").textContent;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(chave).then(function(){ alert("Copiado!"); });
    } else {
        var t=document.createElement("input");t.value=chave;
        document.body.appendChild(t);t.select();
        document.execCommand("copy");document.body.removeChild(t);alert("Copiado!");
    }
}
</script>
